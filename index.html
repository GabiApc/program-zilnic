:root {
  --bg: #0e0e11;
  --surface: #17171c;
  --surface2: #1e1e25;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f2;
  --muted: #6b6b78;
  --accent: #6ee7a0;
  --accent-dim: rgba(110,231,160,0.12);
  --accent-text: #1a3d2b;

  --c-morning: rgba(250,206,122,0.15);
  --c-morning-t: #f5c842;
  --c-sport: rgba(110,231,160,0.13);
  --c-sport-t: #6ee7a0;
  --c-ml: rgba(199,130,206,0.15);
  --c-ml-t: #d18fe0;
  --c-research: rgba(130,148,255,0.13);
  --c-research-t: #8a9fff;
  --c-meal: rgba(255,159,102,0.13);
  --c-meal-t: #ff9f66;
  --c-prep: rgba(160,160,180,0.1);
  --c-prep-t: #9999aa;
  --c-mealprep: rgba(255,180,100,0.13);
  --c-mealprep-t: #ffb464;
  --c-church: rgba(100,220,200,0.13);
  --c-church-t: #64dcc8;
  --c-free: rgba(120,120,140,0.08);
  --c-free-t: #666677;
}

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 18px 60px;
}

.container { max-width: 500px; margin: 0 auto; }

header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
}

.day-name {
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -1px;
  line-height: 1.1;
  color: var(--text);
}

.today-badge {
  display: inline-block;
  font-family: 'Fira Mono', monospace;
  font-size: 10px;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 20px;
  margin-left: 10px;
  vertical-align: middle;
  letter-spacing: 0.05em;
}

.date-str {
  font-family: 'Fira Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  margin-top: 5px;
}

.nav-btns { display: flex; gap: 5px; padding-top: 4px; }
.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  color: var(--muted);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.nav-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
.today-btn {
  font-family: 'Fira Mono', monospace;
  font-size: 10px;
  padding: 0 11px;
  width: auto;
  color: var(--accent);
  border-color: rgba(110,231,160,0.3);
}
.today-btn:hover { background: var(--accent-dim); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
}

.stat-label {
  font-family: 'Fira Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.stat-val {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -1px;
  margin-top: 4px;
  line-height: 1;
}

.stat-val.accent { color: var(--accent); }

.prog-wrap {
  background: var(--surface2);
  border-radius: 4px;
  height: 3px;
  margin-bottom: 28px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.section-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  margin: 22px 0 8px;
  padding: 0 2px;
}

.section-label-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-name {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 500;
  transition: color 0.15s;
}

.section-label:hover .section-name { color: var(--text); }

.section-count {
  font-family: 'Fira Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 1px 7px;
  border-radius: 20px;
}

.section-arrow {
  font-size: 9px;
  color: var(--muted);
  transition: transform 0.2s;
  display: inline-block;
}
.section-arrow.collapsed { transform: rotate(-90deg); }
.section-blocks.collapsed { display: none; }

.block {
  display: flex;
  align-items: center;
  gap: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 11px 13px;
  margin-bottom: 5px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.block:hover { background: var(--surface2); border-color: var(--border2); }
.block.done { opacity: 0.35; }
.block.done .block-name { text-decoration: line-through; }

.check {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  font-size: 11px;
  color: transparent;
  font-weight: 600;
}

.block.done .check {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-text);

.block-info { flex: 1; min-width: 0; }

.block-time {

  font-size: 10px;
  color: var(--muted);
  margin-bottom: 1px;

.block-name {

  margin-top: 3px;
  letter-spacing: -0.5px;

  background: var(--surface2);
  border-radius: 2px;

.wc-fill {

  background: var(--accent);

  border: 1px solid rgba(110,231,160,0.25);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 16px;

  font-size: 12px;
  color: var(--accent);
  text-align: center;
  display: none;
  letter-spacing: 0.02em;

const DAY_SHORT=['Du','Lu','Ma','Mi','Jo','Vi','Sâ'];
const MONTHS=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];

let viewDate=today();

function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dateKey(d){return d.toISOString().slice(0,10);}
function load(){try{return JSON.parse(localStorage.getItem('program-data')||'{}');}catch(e){return{};}}
function save(){try{localStorage.setItem('program-data',JSON.stringify(data));}catch(e){}}

function weekStart(d){
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  const m=new Date(d);m.setDate(d.getDate()+diff);return m;
}

function calcStreak(){
  let streak=0;const t=today();let check=new Date(t);
  for(let i=0;i<365;i++){
    const k=dateKey(check);const dow=check.getDay();
    const sched=SCHEDULE[dow];
    const total=sched.sections.reduce((a,s)=>a+s.blocks.filter(b=>!b.optional).length,0);
    const done=data[k]?Object.values(data[k]).filter(Boolean).length:0;
    if(i===0&&done===0){check.setDate(check.getDate()-1);continue;}
    if(total>0&&done>=Math.ceil(total*0.7)){streak++;check.setDate(check.getDate()-1);}
    else break;
  }
  return streak;
}

function toggle(dateK,key){
  if(!data[dateK])data[dateK]={};
  data[dateK][key]=!data[dateK][key];
  save();render();
}

function changeDay(d){viewDate=new Date(viewDate);viewDate.setDate(viewDate.getDate()+d);render();}
function goToday(){viewDate=today();render();}

function render(){
  const dow=viewDate.getDay();
  const sched=SCHEDULE[dow];
  const dateK=dateKey(viewDate);
  const todayK=dateKey(today());
  const isToday=dateK===todayK;

  document.getElementById('day-name').innerHTML=sched.name+(isToday?'<span class="today-badge">azi</span>':'');
  document.getElementById('date-str').textContent=viewDate.getDate()+' '+MONTHS[viewDate.getMonth()]+' '+viewDate.getFullYear();

  const dayData=data[dateK]||{};
  let total=0,done=0;
  sched.sections.forEach((sec,si)=>sec.blocks.forEach((b,bi)=>{
    if(!b.optional)total++;
    if(dayData[si+'-'+bi])done++;
  }));

  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-streak').textContent=calcStreak();
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('congrats').style.display=(pct===100&&total>0)?'block':'none';

  const container=document.getElementById('blocks');
  container.innerHTML='';
  const collapsedKey='collapsed-'+dow;
  let cs={};
  try{cs=JSON.parse(localStorage.getItem(collapsedKey)||'{}');}catch(e){}

  sched.sections.forEach((sec,si)=>{
    const isCollapsed=!!cs[si];
    const secDone=sec.blocks.filter((b,bi)=>!!dayData[si+'-'+bi]).length;
    const secTotal=sec.blocks.filter(b=>!b.optional).length;

    const lbl=document.createElement('div');
    lbl.className='section-label';
    lbl.innerHTML=
      '<div class="section-label-left">'+
        '<span class="section-name">'+sec.label+'</span>'+
        '<span class="section-count">'+secDone+'/'+secTotal+'</span>'+
      '</div>'+
      '<span class="section-arrow'+(isCollapsed?' collapsed':'')+'">&#9660;</span>';
    lbl.onclick=()=>{
      cs[si]=!cs[si];
      try{localStorage.setItem(collapsedKey,JSON.stringify(cs));}catch(e){}
      render();
    };
    container.appendChild(lbl);

    const wrap=document.createElement('div');
    wrap.className='section-blocks'+(isCollapsed?' collapsed':'');
    sec.blocks.forEach((b,bi)=>{
      const key=si+'-'+bi;
      const checked=!!dayData[key];
      const el=document.createElement('div');
      el.className='block'+(checked?' done':'');
      el.onclick=()=>toggle(dateK,key);
      el.innerHTML=
        '<div class="check">'+(checked?'✓':'')+'</div>'+
        '<div class="block-info">'+
          '<div class="block-time">'+b.time+(b.optional?' · opțional':'')+'</div>'+
          '<div class="block-name">'+b.name+'</div>'+
        '</div>'+
        (b.tag?'<span class="tag tag-'+b.tag+'">'+(TAG_NAMES[b.tag]||b.tag)+'</span>':'');
      wrap.appendChild(el);
    });
    container.appendChild(wrap);
  });

  const wg=document.getElementById('week-grid');
  wg.innerHTML='';
  const ws=weekStart(today());
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const wdow=d.getDay();const wKey=dateKey(d);
    const wS=SCHEDULE[wdow];
    const wTotal=wS.sections.reduce((a,s)=>a+s.blocks.filter(b=>!b.optional).length,0);
    const wDone=data[wKey]?Object.values(data[wKey]).filter(Boolean).length:0;
    const wPct=wTotal>0?Math.round(wDone/wTotal*100):0;
    const cell=document.createElement('div');
    cell.className='week-cell'+(wKey===todayK?' today':'')+(wKey===dateK&&wKey!==todayK?' viewing':'');
    cell.onclick=()=>{viewDate=new Date(d);render();};
    cell.innerHTML='<div class="wc-name">'+DAY_SHORT[wdow]+'</div><div class="wc-pct">'+wPct+'%</div><div class="wc-bar"><div class="wc-fill" style="width:'+wPct+'%"></div></div>';
    wg.appendChild(cell);
  }
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>
</body>
</html>
